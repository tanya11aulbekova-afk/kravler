<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лот — KRAVLER</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23891423'/%3E%3Ctext x='16' y='22' font-family='Georgia' font-size='18' fill='%23faf7f2' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Kravler</span>
    </a>
    <nav class="site-nav" aria-label="Основная навигация">
      <a href="catalog.html">Каталог</a>
      <a href="catalog.html#games">Игры</a>
      <a href="index.html#guarantee">Гарантии</a>
      <a href="index.html#how">Как это работает</a>
    </nav>
    <div class="header-actions">
      <a class="link-quiet" href="#" data-demo>Войти</a>
      <a class="btn btn-pill" href="#" data-demo>Продать<span class="pill-plus">+</span></a>
    </div>
  </header>

  <main id="product-root"></main>

  <footer class="site-footer">
    <div class="footer-bottom">
      <span>© 2026 Kravler. Маркетплейс игровых ценностей.</span>
      <a href="catalog.html">В каталог</a>
    </div>
  </footer>

  <script src="assets/app.js"></script>
  <script>
    const id = Number(new URLSearchParams(location.search).get('id'));
    const offer = OFFERS.find(o => o.id === id) || OFFERS[0];
    const g = gameOf(offer.game);
    const c = catOf(offer.cat);
    document.title = `${offer.name} — KRAVLER`;

    const related = OFFERS
      .filter(o => o.id !== offer.id && (o.game === offer.game || o.cat === offer.cat))
      .slice(0, 5);

    document.getElementById('product-root').innerHTML = `
      <nav class="crumbs" aria-label="Хлебные крошки">
        <a href="index.html">Главная</a><span>/</span>
        <a href="catalog.html?cat=${c.id}">${c.name}</a><span>/</span>
        <a href="catalog.html?game=${g.id}">${g.name}</a>
      </nav>

      <section class="product">
        <div class="product-visual">${offerArt(offer, 320)}</div>
        <div class="product-info">
          <p class="product-tag">${g.name} · ${c.name}</p>
          <h1 class="product-title">${offer.name}</h1>
          <p class="product-price">${fmtPrice(offer.price)}</p>
          <p class="product-desc">${offer.desc}</p>
          <div class="product-meta">
            <div class="meta-cell">
              <span class="meta-label">Выдача</span>
              <span class="meta-value">${offer.time}</span>
            </div>
            <div class="meta-cell">
              <span class="meta-label">Рейтинг</span>
              <span class="meta-value">★ ${offer.rating}</span>
            </div>
            <div class="meta-cell">
              <span class="meta-label">Сделок</span>
              <span class="meta-value">${offer.deals.toLocaleString('ru-RU')}</span>
            </div>
          </div>
          <div class="product-actions">
            <a class="btn btn-pill btn-red" href="#" data-demo>Купить сейчас<span class="pill-plus">+</span></a>
            <a class="btn btn-pill" href="#" data-demo>Написать продавцу</a>
          </div>
        </div>
      </section>

      <div class="seller-strip">
        <div class="seller-id">
          <span class="seller-avatar">${offer.seller[0]}</span>
          <span class="seller-name">${offer.seller}</span>
        </div>
        <div class="seller-facts">
          <span>Рейтинг <b>★ ${offer.rating}</b></span>
          <span>Сделок <b>${offer.deals.toLocaleString('ru-RU')}</b></span>
          <span>Средняя выдача <b>${offer.time}</b></span>
          <span>Под защитой <b>Эскроу</b></span>
        </div>
      </div>

      <section class="related">
        <div class="section-head">
          <h2 class="section-title">Похожие лоты</h2>
          <a class="link-more" href="catalog.html">В каталог<span class="pill-plus">+</span></a>
        </div>
        <div class="rail">${related.map(offerCard).join('')}</div>
      </section>`;
  </script>
</body>
</html>
