<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лот — KRAVLER</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23d90f26'/%3E%3Ctext x='16' y='23' font-family='Arial' font-weight='bold' font-size='19' fill='%23fff' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="assets/fonts/fonts.css">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body id="top">

  <header class="site-header"></header>

  <main id="product-root"></main>

  <footer class="site-footer"></footer>

  <script src="assets/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const id = Number(new URLSearchParams(location.search).get('id'));
      const offer = OFFERS.find(o => o.id === id) || OFFERS[0];
      const g = gameOf(offer.game);
      const c = catOf(offer.cat);
      document.title = `${offer.name} — KRAVLER`;

      const related = OFFERS
        .filter(o => o.id !== offer.id && (o.game === offer.game || o.cat === offer.cat))
        .slice(0, 4);

      document.getElementById('product-root').innerHTML = `
        <nav class="crumbs" aria-label="Хлебные крошки">
          <a href="index.html">Главная</a><span>/</span>
          <a href="catalog.html?cat=${c.id}">${c.name}</a><span>/</span>
          <a href="catalog.html?game=${g.id}">${g.name}</a>
        </nav>

        <div class="product">
          <div class="p-visual">
            <div class="p-thumb">${g.mono}</div>
            <div class="p-visual-foot">
              <span class="pv-fact"><b>${offer.time}</b>выдача</span>
              <span class="pv-fact"><b>★ ${offer.rating}</b>рейтинг</span>
              <span class="pv-fact"><b>${fmtNum(offer.deals)}</b>сделок</span>
              <span class="pv-fact"><b>Эскроу</b>защита</span>
            </div>
          </div>
          <div class="p-info">
            <span class="c-tag">${g.name} <span>· ${c.name}</span></span>
            <h1 class="p-title">${offer.name}</h1>
            <div class="p-price">${fmtPrice(offer)}</div>
            <p class="p-desc">${offer.desc}</p>
            <div class="p-chips">
              <span class="chip-info">🛡 Деньги на эскроу до выдачи</span>
              <span class="chip-info">↩ Гарантия возврата</span>
              <span class="chip-info">⚡ Выдача ${offer.time}</span>
            </div>
            <div class="p-actions">
              <a class="btn btn-red" href="#" data-demo>Купить за ${fmtPrice(offer)}</a>
              <a class="btn btn-light" href="#" data-demo>Написать продавцу</a>
            </div>
          </div>
        </div>

        <div class="seller-card">
          <div class="seller-in">
            <div class="s-id">
              <span class="s-ava">${offer.seller[0]}</span>
              <span><span class="s-name">${offer.seller}</span><br><span class="s-sub">Продавец · на Kravler с 2026</span></span>
            </div>
            <div class="s-facts">
              <span class="s-fact"><b><i>★</i> ${offer.rating}</b>рейтинг</span>
              <span class="s-fact"><b>${fmtNum(offer.deals)}</b>сделок</span>
              <span class="s-fact"><b>${offer.time}</b>средняя выдача</span>
              <span class="s-fact"><b>99%</b>успешных сделок</span>
            </div>
          </div>
        </div>

        <section>
          <div class="sec-head"><h2>Похожие предложения</h2><a class="more" href="catalog.html?game=${g.id}">Все лоты ${g.name} →</a></div>
          <div class="offers">${related.map(offerCard).join('')}</div>
        </section>`;
    });
  </script>
</body>
</html>
